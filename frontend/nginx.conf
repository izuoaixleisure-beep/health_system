server {
    # 监听 80 端口
    listen 80;
    server_name localhost;

    # 所有请求都指向 /usr/share/nginx/html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # 关键配置：如果文件不存在，就回退到 index.html
        # 原因：Vue 是单页应用，/residents、/health 等路由是前端处理的
        # 如果不配置，用户刷新页面时 Nginx 会报 404（因为服务器上没有 /residents 这个文件）
        try_files $uri $uri/ /index.html;
    }

    # 反向代理：所有 /api 开头的请求转发到后端容器
    # 原因：前端代码里写的是相对路径 /api，Nginx 负责转发到 backend:8000
    location /api {
        # 去掉 /api 前缀，把剩余部分发给后端
        rewrite ^/api/(.*) /$1 break;
        
        # backend 是服务名，Docker 会自动解析为容器 IP
        proxy_pass http://backend:8000;
        
        # 转发必要的头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
